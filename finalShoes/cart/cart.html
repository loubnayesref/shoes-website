            <div class="cart_info">
                <form class="client_info">
                    <h1>Client Information</h1>
                    <div class="cart_info_inputs">
                        <div class="cart_info_input">
                            <label class="cart_label" for="firstname">First Name</label>
                            <input type="text" name="firstname" placeholder="enter your first name....">
                        </div>
                        <div class="cart_info_input">
                            <label class="cart_label" for="lastname">Last Name</label>
                            <input type="text" name="lastname" placeholder="enter your last name...">
                        </div>
                    </div>
                    <div class="cart_info_inputs">
                        <div class="cart_info_input">
                            <label class="cart_label" for="email">Email</label>
                            <input type="email" name="email" placeholder="enter your email...">
                        </div>
                        <div class="cart_info_input">
                            <label class="cart_label" for="password">password</label>
                            <input type="password" name="password" placeholder="enter your password...">
                        </div>
                    </div>
                    <div class="cart_info_inputs">
                        <div class="cart_info_input">
                            <label class="cart_label" for="Address">City</label>

                                <option>Algiers</option>
                                <option>oran</option>
                            </select>
                        </div>
                        <div class="cart_info_input">
                            <label class="cart_label" for="city">Address</label>

                    </div>
