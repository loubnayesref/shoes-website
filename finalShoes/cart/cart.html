<!DOCTYPE html>
<html>
    <head>
        <title>Cart</title>
        <meta name="description" content="web page that sells sport shoes">
        <meta charset="UTF-8">
        <link rel="stylesheet" type="text/css" href="./cart.css">
    </head>
    <body>
                <!--menu list-->
                <ul class="menu">
                    <li><a  href="../index.html">Home</a></li>
                    <li><a  href="#">About</a></li>
                    <li><a  href="#">Categories</a></li>
                    <li><a  href="#">Top Products</a></li>
                </ul>
                <div class="cart_wrapper">
                    <div class="cart_info">
                        <form class="client_info">
                            <h1 class="cart_h1">Client Information</h1>
                            <div class="cart_info_inputs">
                                <div class="cart_info_input">
                                    <label class="cart_label" to="firstname">Firstname</label>
                                    <input  type="text" name="firstname"/>
                                </div>
                                <div class="cart_info_input">
                                    <label class="cart_label" to="Lastname">Lastname</label>
                                    <input  type="text" name="lastname"/>
                                </div>
                            </div>
                            <div class="cart_info_inputs">
                                <div class="cart_info_input">
                                    <label class="cart_label" to="email">Email</label>
                                    <input  type="email" name="email"/>
                                </div>
                                <div class="cart_info_input">
                                    <label class="cart_label" to="phone">Phone Number</label>
                                    <input  type="text" name="phone"/>
                                </div>
                            </div>
                            <div class="cart_info_inputs">
                                <div class="cart_info_input">
                                    <label class="cart_label" to="city">City</label>
                                    <select class="cart_info_select">
                                        <option>Algies</option>
                                        <option>Oran</option>
                                    </select>
                                </div>
                                <div class="cart_info_input">
                                    <label class="cart_label" to="address">Address</label>
                                    <input type="text" name="address"/>
                                </div>
                            </div>
                        </form>
                        <div class="productinfo">
                            <h1 class="cart_h1">Product Information </h1>
                            <table class="cart_table">
                                <tr class="cart_table_head">
                                    <th>Product</th>
                                    <th>Title</th>
                                    <th>quantity</th>
                                    <th>Price</th>
                                    <th>Total Price</th>
                                </tr>
                                <tfoot>
                                    <td colspan="4">Total:</td>
                                    <td class="totalpay"></td>
                                </tfoot>
                                
                                
                            </table>
                            
                        </div>

                    </div>
                    <div class="cart_summary">
                        <h1 class="cart_h1">Order Summary</h1>
                        <form>
                            <label class="cart_label">Promo code</label>
                            <div class="cart_summary_input">
                                <input type="text" name="promo" id="promocode"/>
                                <button class="promo_btn">Apply</button>
                            </div>
                        </form>
                        <div class="productinfo_cost">
                            <h3>Product Cost</h3>
                            <p id="costbefore"></p>
                        </div>
                        <button class="confirm_btn">Confirm Order</button>

                    </div>
                </div>
                <script src="cart.js"></script>
    </body>
</html>
